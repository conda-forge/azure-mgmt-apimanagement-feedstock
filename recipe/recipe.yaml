schema_version: 1

context:
  name: azure-mgmt-apimanagement
  version: 4.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-apimanagement-${{ version }}.zip
  sha256: 0224e32c9dbc83cd319eb4452df3d47af26079ac4ba6e1a6be4777f85b24362c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - isodate >=0.6.1,<1.0
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.3.2,<2.0

tests:
  - python:
      imports:
        - azure.mgmt.apimanagement
        - azure.mgmt.apimanagement.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure API Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
